apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app
  namespace: lab-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-web
  template:
    metadata:
      labels:
        app: flask-web
    spec:
      containers:
      - name: flask-container
        image: docker.io/library/lab-app:v1
        imagePullPolicy: Never
        ports:
        - containerPort: 5000